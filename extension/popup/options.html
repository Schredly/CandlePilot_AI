<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CandlePilot Settings</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="dark">
    <header class="topbar">
      <div class="logo">
        <span class="logo-mark" aria-hidden="true">✦</span>
        <span class="logo-text">CandlePilot · Settings</span>
      </div>
    </header>

    <section class="panel">
      <div class="panel-head"><h2>Endpoints</h2></div>
      <form id="settingsForm" class="settings-form">
        <label>
          <span class="muted small">Backend API base</span>
          <input id="apiBase" type="url" placeholder="http://localhost:8000" />
        </label>
        <label>
          <span class="muted small">Frontend app base</span>
          <input id="appBase" type="url" placeholder="http://localhost:3000" />
        </label>
        <label>
          <span class="muted small">Default timeframe</span>
          <select id="timeframe">
            <option value="1m">1m</option>
            <option value="5m">5m</option>
            <option value="15m">15m</option>
            <option value="1h">1h</option>
            <option value="4h">4h</option>
            <option value="1d">1d</option>
          </select>
        </label>
        <div class="row">
          <button type="submit" class="ghost-btn">Save</button>
          <span id="status" class="muted small"></span>
        </div>
      </form>
    </section>

    <style>
      .settings-form { display: flex; flex-direction: column; gap: 10px; }
      .settings-form label { display: flex; flex-direction: column; gap: 3px; }
      .settings-form input,
      .settings-form select {
        background: rgba(255, 255, 255, 0.04);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 13px;
      }
      .row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
    </style>

    <script src="options.js"></script>
  </body>
</html>
